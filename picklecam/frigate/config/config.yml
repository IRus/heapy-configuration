mqtt:
  enabled: true
  host: 192.168.1.250
  port: 1883

ffmpeg:
  hwaccel_args: preset-vaapi

# One restream per camera. The `#audio=aac#audio=opus` producer transcodes the
# camera's G.711 audio into AAC (MSE player) + Opus (WebRTC) so live view has sound.
# Video stays H.264 copy — only audio is transcoded (cheap).
go2rtc:
  streams:
    home_room:
      - rtsp://admin:{FRIGATE_CAM246_PASSWORD}@192.168.1.246:554/stream1
      - ffmpeg:home_room#audio=aac#audio=opus
    home_kitchen:
      - rtsp://admin:{FRIGATE_CAM247_PASSWORD}@192.168.1.247:554/stream1
      - ffmpeg:home_kitchen#audio=aac#audio=opus
    garage:
      - rtsp://admin:{FRIGATE_CAM248_PASSWORD}@192.168.1.248:554/stream1
      - ffmpeg:garage#audio=aac#audio=opus
    front:
      - rtsp://admin:{FRIGATE_CAM251_PASSWORD}@192.168.1.251:554/stream1
      - ffmpeg:front#audio=aac#audio=opus
    side:
      - rtsp://admin:{FRIGATE_CAM252_PASSWORD}@192.168.1.252:554/stream1
      - ffmpeg:side#audio=aac#audio=opus
    back:
      - rtsp://admin:{FRIGATE_CAM253_PASSWORD}@192.168.1.253:554/stream1
      - ffmpeg:back#audio=aac#audio=opus

detectors:
  coral:
    type: edgetpu
    device: usb

objects:
  track:
    - person
    - cat
    - dog

record:
  enabled: true
  continuous:
    days: 7          # keep EVERYTHING for 7 days (scrub-back buffer)
  motion:
    days: 14         # days 3–14: keep only segments with motion
  alerts:
    retain:
      days: 60       # footage around alerts kept 60 days
      mode: motion
  detections:
    retain:
      days: 60       # footage around detections kept 60 days
      mode: motion
snapshots:
  enabled: true
  retain:
    default: 90

birdseye:
  enabled: true
  mode: continuous

cameras:
  home_room:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/home_room
          input_args: preset-rtsp-restream
          roles:
            - record
            - detect
  home_kitchen:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/home_kitchen
          input_args: preset-rtsp-restream
          roles:
            - record
            - detect
  garage:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/garage
          input_args: preset-rtsp-restream
          roles:
            - record
            - detect
  front:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/front
          input_args: preset-rtsp-restream
          roles:
            - record
            - detect
  side:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/side
          input_args: preset-rtsp-restream
          roles:
            - record
            - detect
    objects:
      filters:
        person:
          min_score: 0.70
          threshold: 0.80
  back:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/back
          input_args: preset-rtsp-restream
          roles:
            - record
            - detect
    objects:
      filters:
        person:
          min_score: 0.70
          threshold: 0.80
version: 0.15-1
