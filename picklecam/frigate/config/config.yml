mqtt:
  enabled: true
  host: 192.168.1.250
  port: 1883

ffmpeg:
  hwaccel_args: preset-vaapi

go2rtc:
  streams:
    home_kitchen:
      - rtsp://admin:{FRIGATE_CAM247_PASSWORD}@192.168.1.247:554/stream1
      - ffmpeg:home_kitchen#audio=aac#audio=opus

detectors:
  coral:
    type: edgetpu
    device: usb

objects:
  track:
    - person
    - cat
    - dog

record:
  enabled: true
  retain:
    days: 90
    mode: all
  alerts:
    retain:
      days: 90
  detections:
    retain:
      days: 90
snapshots:
  enabled: true
  retain:
    default: 90

birdseye:
  enabled: true
  mode: continuous

cameras:
  home_kitchen:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-copy
      inputs:
        - path: rtsp://127.0.0.1:8554/home_kitchen
          input_args: preset-rtsp-restream
          roles:
            - record
            - detect
  garage:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://admin:{FRIGATE_CAM248_PASSWORD}@192.168.1.248:554/stream1
          roles:
            - record
            - detect
  front:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://admin:{FRIGATE_CAM251_PASSWORD}@192.168.1.251:554/stream1
          roles:
            - record
            - detect
  side:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://admin:{FRIGATE_CAM252_PASSWORD}@192.168.1.252:554/stream1
          roles:
            - record
            - detect
    objects:
      filters:
        person:
          min_score: 0.70
          threshold: 0.80
  back:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://admin:{FRIGATE_CAM253_PASSWORD}@192.168.1.253:554/stream1
          roles:
            - record
            - detect
    objects:
      filters:
        person:
          min_score: 0.70
          threshold: 0.80
version: 0.15-1
