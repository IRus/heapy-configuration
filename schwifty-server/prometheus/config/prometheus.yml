# https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "prometheus"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["monitoring_node_exporter:9100"]

  - job_name: "cadvisor"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["monitoring_cadvisor:8080"]

  - job_name: "grafana"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["monitoring_grafana:3000"]

  - job_name: "loki"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["monitoring_loki:3100"]

  - job_name: "promtail"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["monitoring_promtail:3200"]

  - job_name: "kotbot"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["kotbot:8080"]

  - job_name: "tgpt"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["tgpt:8080"]

  - job_name: "repo_kotlin_link"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["repo_kotlin_link:8080"]
