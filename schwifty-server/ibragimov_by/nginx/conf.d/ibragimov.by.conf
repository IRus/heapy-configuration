server {
  listen 80 default_server;
  listen [::]:80 default_server;

  server_name ibragimov.by;

  # Docker's embedded DNS. Combined with a variable in proxy_pass below, this
  # makes nginx re-resolve upstreams per request instead of caching the IP at
  # startup, so a recreated container (e.g. after a kodkod image update) doesn't
  # leave us proxying to a dead IP (502).
  resolver 127.0.0.11 valid=10s ipv6=off;

  location = / {
    return 301 https://ruslan.ibragimov.by;
  }

  location = /favicon.ico {
    return 301 https://ruslan.ibragimov.by/favicon.ico;
  }

  location = /currency {
    absolute_redirect off;
    return 301 /currency/;
  }

  location /currency/ {
    set $currency_upstream http://ibragimov_by_currency;
    rewrite ^/currency/(.*)$ /$1 break;
    proxy_pass $currency_upstream;
    proxy_set_header Host $http_host;
  }

  location /tt-rss {
    set $ttrss_upstream http://ttrss_nginx;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;

    proxy_pass $ttrss_upstream;
    break;
  }

  # Public read-only file drop. Upload by placing files/folders on the host
  # under schwifty-server/ibragimov_by/files/ (scp or `docker cp`); the dir is
  # mounted read-only and listed via autoindex. absolute_redirect off keeps
  # directory redirects relative so they stay on https behind Cloudflare.
  location = /files {
    absolute_redirect off;
    return 301 /files/;
  }

  location /files/ {
    alias /srv/files/;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;
    absolute_redirect off;
  }
}
