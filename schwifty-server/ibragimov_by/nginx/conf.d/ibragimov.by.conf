server {
  listen 80 default_server;
  listen [::]:80 default_server;

  server_name ibragimov.by;

  location = / {
    return 301 https://ruslan.ibragimov.by;
  }

  location = /favicon.ico {
    return 301 https://ruslan.ibragimov.by/favicon.ico;
  }

  location /currency {
    proxy_pass http://ibragimov_by_currency/;
    proxy_set_header Host $http_host;
  }

  location /tt-rss {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;

    proxy_pass http://ttrss_nginx;
    break;
  }

  # Public read-only file drop. Upload by placing files/folders on the host
  # under schwifty-server/ibragimov_by/files/ (scp or `docker cp`); the dir is
  # mounted read-only and listed via autoindex. absolute_redirect off keeps
  # directory redirects relative so they stay on https behind Cloudflare.
  location = /files {
    absolute_redirect off;
    return 301 /files/;
  }

  location /files/ {
    alias /srv/files/;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;
    absolute_redirect off;
  }
}
