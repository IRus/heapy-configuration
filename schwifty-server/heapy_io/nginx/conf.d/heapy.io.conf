server {
  listen 80 default_server;
  listen [::]:80 default_server;

  server_name heapy.io;

  # Docker's embedded DNS. Combined with a variable in proxy_pass below, this
  # makes nginx re-resolve upstreams per request instead of caching the IP at
  # startup, so a recreated container (e.g. after a kodkod image update) doesn't
  # leave us proxying to a dead IP (502).
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /kotlin_jobs {
    set $kotlin_jobs_upstream http://heapy_io_kotlin_jobs;
    rewrite ^/kotlin_jobs/?(.*)$ /$1 break;
    proxy_pass $kotlin_jobs_upstream;
    proxy_set_header Host $http_host;
  }

  location / {
    set $root_upstream http://heapy_io_root;
    proxy_pass $root_upstream;
    proxy_set_header Host $http_host;
  }
}

server {
  listen 80;
  listen [::]:80;

  server_name kinetica.heapy.io;

  # Docker's embedded DNS. Combined with a variable in proxy_pass below, this
  # makes nginx re-resolve upstreams per request instead of caching the IP at
  # startup, so a recreated container (e.g. after a kodkod image update) doesn't
  # leave us proxying to a dead IP (502).
  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    set $kinetica_docs_upstream http://heapy_io_kinetica_docs:8080;
    proxy_pass $kinetica_docs_upstream;
    proxy_set_header Host $http_host;
  }
}
